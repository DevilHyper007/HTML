<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- if using file input method="post" mandatory 
  enctype="multipart/form-data" mandatory
  -->
  <form name="UserDataForm" id="UserDataForm" method="post" action="" enctype="multipart/form-data">
    <label for="FullName">Full Name:</label>
    <input type="text" name="FullName" id="FullName">
    <br><br>
    <label for="UserEmail">Email Address: </label>
    <input type="email" name="UserEmail" id="UserEmail">
    <br><br>
    <label for="">Select Topic: </label>
    <input type="checkbox" name="ck1" value="HTML" checked>
    <label for="ck1">HTML</label>
    <input type="checkbox" name="ck2" value="CSS">
    <label for="ck2">CSS</label>
    <input type="checkbox" name="ck3" value="JavaScript">
    <label for="ck3">JavaScript</label>
    <br><br>
    <label for="DOB">Date of Birth:</label>
    <input type="date" name="DOB" id="DOB">
    <br><br>
    <label for="Age">Age:</label>
    <input type="number" name="Age" id="Age" min="1" max="80">
    <br><br>
    <input type="color">
    <br><br>
    <label for="fileData">Select file to upload: </label><br>
    <input type="file" name="fileData" id="fileData">
    <br><br>
    <input type="submit" name="AddRecord" value="Add Record !!!">
    <input type="reset">
    <br><br>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3582.304214745193!2d85.35951490000001!3d26.1216222!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39ed10cde2a33e53%3A0x684909dbc481698b!2sL.N.%20Mishra%20College%20Of%20Business%20Management!5e0!3m2!1sen!2sin!4v1774424308376!5m2!1sen!2sin"
      width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
  </form>
</body>
</html>
