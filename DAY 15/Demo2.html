<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="myid"></div>
  <script>
    let ctr = document.getElementById("myid");
    let GST = 10;

    switch (GST) {
      case 10:
        ctr.innerHTML = "GST is 10%";
        break;
      case 18:
        ctr.innerHTML = "GST is 18%";
        break;
      case 28:
        ctr.innerHTML = "GST is 28%";
        break;
      default:
        ctr.innerHTML = "GST is not applicable";
    }
  </script>
</body>
</html>
