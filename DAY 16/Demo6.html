<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="myid"></div>
  <script>
    let ctr = document.getElementById("myid");

    let employee = {
      Name: "Raja Singh",
      Age: 24,
      City: "Muzaffarpur",
      Information: function () {
        return "Name: " + this.Name + " Age: " + this.Age + " City: " + this.City;
      },
      FullName: function () {
        return "Full name of employee: " + this.Name;
      }
    }



    // ctr.innerHTML = employee["Name"];
    // ctr.innerHTML = employee.Name;
    // ctr.innerHTML = employee.Information();
    ctr.innerHTML = employee.FullName();

  </script>
</body>
</html>
