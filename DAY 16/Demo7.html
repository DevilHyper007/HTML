<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="myid"></div>
  <button onclick="countme()">Count Me !!!</button>
  <script>
    let ctr = document.getElementById("myid");

    function countData() {
      let counter = 0;
      return function () {
        counter++;
        return counter;
      }
    }
    let c = countData();
    function countme() {
      ctr.innerHTML = c();
    }
  </script>
</body>
</html>
