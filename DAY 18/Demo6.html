<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div,
    h1,
    p {
      display: inline;
      background-color: cadetblue;
      border: 1px solid black;
    }

    a,
    span,
    b {
      display: block;
      background-color: aqua;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <div>Data</div>
  <h1>Data</h1>
  <p>Data</p>
  <hr>
  <a href="">Data</a>
  <span>Data</span>
  <b>Data</b>
</body>
</html>
