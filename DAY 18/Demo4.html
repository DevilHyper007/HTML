<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <div id="myid"></div>
  <script>
    let ctr = document.getElementById("myid");

    let num1 = "10";
    ctr.innerHTML += isNaN(num1) + "<br>";
    ctr.innerHTML += isFinite(1 / 0) + "<br>";
    ctr.innerHTML += Number.MAX_SAFE_INTEGER + "<br>";
    ctr.innerHTML += Number.MIN_SAFE_INTEGER + "<br>";
    ctr.innerHTML += Number.MAX_VALUE + "<br>";
    ctr.innerHTML += Number.MIN_VALUE + "<br>";
    ctr.innerHTML += Number.POSITIVE_INFINITY + "<br>";
    ctr.innerHTML += Number.NEGATIVE_INFINITY + "<br>";
  </script>
</body>
</html>
