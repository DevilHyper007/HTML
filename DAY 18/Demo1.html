<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="myid"></div>

  <script>
    let ctr = document.getElementById("myid");

    ctr.innerHTML += Math.PI + "<br>";
    ctr.innerHTML += Math.pow(3, 2) + "<br>";
    ctr.innerHTML += Math.ceil("10.1") + "<br>";
    ctr.innerHTML += Math.floor("10.9") + "<br>";
    ctr.innerHTML += Math.round("10.4") + "<br>";
    ctr.innerHTML += Math.min(2, 4, 6, 8, 9, 1, 2, 24, 564, 54, 2, 54, 65, 4) + "<br>";
    ctr.innerHTML += Math.max(2, 4, 6, 8, 9, 1, 2, 24, 564, 54, 2, 54, 65, 4) + "<br>";
    ctr.innerHTML += Math.round(Math.random() * 1000) + 1 + "<br>";

  </script>
</body>
</html>
