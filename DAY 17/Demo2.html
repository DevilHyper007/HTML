<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="myid">Hi</div>

  <script>
    let ctr = document.getElementById("myid");

    ctr.addEventListener("click", function () {
      ctr.innerHTML = "Welcome !!!";
    });

    ctr.addEventListener("dblclick", function () {
      ctr.innerHTML = "Maclics !!!";
      ctr.style.color = "red";
    });

    ctr.addEventListener("mouseover", function () {
      ctr.innerHTML = "Welcome !!!";
      ctr.style.color = "blue";
    });

    ctr.addEventListener("mouseout", function () {
      ctr.innerHTML = "Bye";
      ctr.style.color = "red";
    });
  </script>
</body>
</html>
