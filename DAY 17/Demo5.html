<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input type="text" name="user" id="user" >
  <hr>
  <div id="data"></div>
  <script>
    let ctr=document.getElementById("user");
    let ctrdata=document.getElementById("data");

    ctr.addEventListener("keydow",function(){
      ctrdata.innerHTML=this.value.toUpperCase();
    })
  </script>
</body>
</html>
