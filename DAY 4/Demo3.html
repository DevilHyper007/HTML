<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Enter Employee Information</h2>
    <form action="Msg.html" method="get">
      Full Name:<input
        type="text"
        name="FullName"
        size="30"
        maxlength="5"
        placeholder="Enter Your Name"
        value="Hyper Raja"
      />
      <br /><br />
      Password: <input type="password" name="userpassword" /> <br /><br />
      Address:
      <textarea
        name="Address"
        placeholder="Enter Your Address"
        cols="50"
        rows="4"
      ></textarea>
      <br /><br />
      Select Section: <br />
      <input type="radio" name="Section" id="Section1" value="Section A" />
      <label for="Section1">Section A</label> <br />
      <input
        type="radio"
        name="Section"
        id="Section2"
        value="Section B"
      /><label for="Section2">Section B</label> <br />
      <input
        type="radio"
        name="Section"
        id="Section3"
        value="Section C"
      /><label for="Section3">Section C</label> <br />
      <input
        type="radio"
        name="Section"
        id="Section4"
        value="Section D"
      /><label for="Section4">Section D</label> <br />
      <br /><br />
      Select Section: <select name="SectionData" id="">
        <option value="Section A">Section A</option>
        <option value="Section B">Section B</option>
        <option value="Section C">Section C</option>
        <option value="Section D" selected>Section D</option>
      </select>
      <br><br>
      <input type="submit" name="Add Record !!" />
    </form>
  </body>
</html>
