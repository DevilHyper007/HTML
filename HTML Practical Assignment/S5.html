<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Section E: Tables</title>
  </head>
  <body>
    <table>
      <caption>
        Student Name
      </caption>
      <tr>
        <th>Name</th>
        <th>Age</th>
      </tr>

      <tr>
        <td>Raja</td>
        <td>25</td>
      </tr>
      <tr>
        <td>Radha</td>
        <td>30</td>
      </tr>
    </table>

    <table border="1">
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
      </tr>
      <tr>
        <td colspan="2">1</td>
        <td rowspan="2">2</td>
      </tr>
      <tr>
        <td>4</td>
        <td>5</td>
      </tr>
    </table>

    <br /><br />
    <table border="1">
      <caption>
        <b>Time Table</b>
      </caption>
      <tr>
        <th>Day</th>
        <th>Subject</th>
        <th>Time</th>
      </tr>
      <tr>
        <td>Monday</td>
        <td>Math</td>
        <td>9:00-10:00</td>
      </tr>
      <tr>
        <td>Tuesday</td>
        <td>Science</td>
        <td>9:00-10:00</td>
      </tr>
      <tr>
        <td>Wednesday</td>
        <td>History</td>
        <td>9:00-10:00</td>
      </tr>
      <tr>
        <td>Thursday</td>
        <td>Geography</td>
        <td>9:00-10:00</td>
      </tr>
      <tr>
        <td>Friday</td>
        <td>English</td>
        <td>9:00-10:00</td>
      </tr>
      <tr>
        <td>Saturday</td>
        <td>Physical Education</td>
        <td>9:00-10:00</td>
      </tr>
      <tr>
        <td>Sunday</td>
        <td>Rest Day</td>
        <td>-</td>
      </tr>
    </table>
  </body>
</html>
